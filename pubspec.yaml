name: pomodoro_manuscript_app
description: Aplicación de Pomodoro con temporizadores configurables, seguimiento de estadísticas y una estética de manuscrito en papel beige.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons:
  provider:
  shared_preferences:
  audioplayers:
  cached_network_image:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: ManuscriptFont
      fonts:
        - asset: assets/fonts/ManuscriptFont-Regular.ttf
        - asset: assets/fonts/ManuscriptFont-Bold.ttf
          weight: 700
    - family: HandwritingFont
      fonts:
        - asset: assets/fonts/HandwritingFont-Regular.ttf