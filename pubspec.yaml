name: pomodoro_manuscript_app
description: A Pomodoro app with configurable timers, statistics tracking, and a beige manuscript aesthetic.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider:
  shared_preferences:
  audioplayers:
  equatable:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/

  fonts:
    - family: ManuscriptFont
      fonts:
        - asset: assets/fonts/ManuscriptFont-Regular.ttf
        - asset: assets/fonts/ManuscriptFont-Bold.ttf
          weight: 700